  github_com_AlfonsoDaniel-dev_EducationMaxxing_src_app_submission.SubmissionOutputDTO:
    properties:
      assignmentId:
        type: string
      confirmationToken:
        type: string
      courseId:
        type: string
      files:
        items:
          $ref: '#/definitions/github_com_AlfonsoDaniel-dev_EducationMaxxing_src_app_submission.FileOutputDTO'
        type: array
      grade:
        format: float64
        type: number
      id:
