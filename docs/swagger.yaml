  github_com_AlfonsoDaniel-dev_EducationMaxxing_src_app_course.CourseOutputDTO:
    properties:
      description:
        type: string
      id:
        type: string
      name:
        type: string
      period:
        type: string
      professorId:
        type: string
      studentIds:
        items:
          type: string
        type: array
    type: object
  github_com_AlfonsoDaniel-dev_EducationMaxxing_src_app_course.CreateCourseInputDTO:
    properties:
      description:
        type: string
